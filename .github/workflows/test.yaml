name: test
on:
  push:
    paths-ignore:
      - LICENSE
      - README.*
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        nim-version:
          - 'stable'
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Git OpenSSL 1.1 on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "C:\Program Files\Git\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpcre3-dev libpcre3

      - run: "npm install node-gyp -g"
      - run: "npm install cmake-js -g"

      - run: nimble install denim@#head -Y
      - run: nimble test