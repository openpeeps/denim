name: test
on:
  push:
    paths-ignore:
      - LICENSE
      - README.*
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        nim-version:
          - 'stable'
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpcre3-dev libpcre3

      # - run: "npm install node-gyp -g" not needed now
      - run: "npm install cmake-js -g"
      - run: "nimble install -Y" # Install dependencies for tests
      
      - name: Copy denim binary to bin/ (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir bin
          nim c -d:release -o:bin/denim.exe src/denim.nim

      - name: Copy denim binary to bin/ (Unix)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p bin
          nim c -d:release -o:bin/denim src/denim.nim

      - run: nimble test